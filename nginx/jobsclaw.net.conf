# AutoApply — jobsclaw.net
# Place this file at: /etc/nginx/sites-available/jobsclaw.net
# Then: ln -s /etc/nginx/sites-available/jobsclaw.net /etc/nginx/sites-enabled/
# Then: certbot --nginx -d jobsclaw.net -d www.jobsclaw.net

server {
    listen 80;
    server_name jobsclaw.net www.jobsclaw.net;

    # Proxy everything to the Docker app container on port 8000
    location / {
        proxy_pass         http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection 'upgrade';
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;

        # Allow large file uploads (resumes)
        client_max_body_size 10M;
    }
}
